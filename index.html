<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約フォーム</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        /* 右端の細いナビ（固定） */
        .side-nav {
            position: fixed;
            /* 画面スクロールしても固定 */
            right: -5px;
            /* さらに右へ */
            top: 80%;
            /* 画面中央に固定 */
            transform: translateY(-50%) translateX(16px);
            /* 中央配置と右ずらし */
            background: #45c4b7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px;
            border-radius: 10px 0 0 10px;
            z-index: 1000;
            width: 35px;
            /* さらに細く */
        }

        .side-nav a:active {
            transform: scale(1.0);
            /* タップした後に元のサイズに戻す */
        }

        .side-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 10px;
            margin: 5px 0;
            padding: 5px;
            transition: background 0.3s, transform 0.2s;
            border-radius: 5px;
            width: 30px;
            height: 30px;
            text-align: center;
        }

        .side-nav a span {
            font-size: 24px;
            /* 矢印をさらに大きく */
            position: absolute;
            left: 2px;
            /* 左端に寄せる */
            top: 13px;
            /* さらに下へ */
        }

        /* スマホ用の微調整 */
        @media (max-width: 600px) {
            .side-nav {
                right: 2px;
                /* スマホではさらに右端に */
                width: 30px;
                /* もっと細く */
            }

            .side-nav a {
                width: 28px;
                height: 28px;
            }

            .side-nav a i {
                font-size: 12px;
                /* スマホではもっと小さく */
            }
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            margin: 0;
            padding-top: 5px;
            overflow-x: hidden;
        }

        .container {
            background-color: #fdfdfd;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 96%;
            max-width: 500px;
            padding: 25px;
            box-sizing: border-box;
            margin: 0 auto;
        }

        h1 {
            background: linear-gradient(135deg, #45c4b7, #45c4b7);
            color: white;
            padding: 20px;
            border-radius: 0 0px 0px 0px;
            text-align: center;
            display: block;
            margin: -20px -15px 20px -15px;
            font-size: 26px;
            font-weight: 100;
            box-shadow: inset 0 -5px 10px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        .label {
            display: block;
            margin-bottom: 20px;
            padding: 3px;
            font-weight: 400;
            background-color: #45c4b7;
            color: #ffffff;
            border-radius: 0px;
            font-size: 18px;
            text-align: center;
            text-indent: 20px;
            position: relative;
            overflow: hidden;
            border-top: 1px solid black;
            /* 上の線 */
            border-bottom: 1px solid black;
            /* 下の線 */
        }

        .labelkibounitizi {
            display: block;
            margin: 10px 0;
            padding: 3px 0;
            font-weight: 400;
            background-color: #45c4b7;
            color: #ffffff;
            border-radius: 0px;
            font-size: 18px;
            text-align: center;
            text-indent: 20px;
            position: relative;
            overflow: hidden;
            border-top: 1px solid black;
            border-bottom: 1px solid black;
            line-height: 1.2;
        }

        .labeltyuuou {
            display: block;
            margin-bottom: 20px;
            padding: 3px;
            background-color: #45c4b7;
            color: #ffffff;
            border-radius: 0px;
            font-size: 18px;
            text-align: center;
            text-indent: 0px;
            position: relative;
            overflow: hidden;
            border-top: 1px solid black;
            border-bottom: 1px solid black;
        }

        .labelmessezi {
            display: block;
            margin-top: 10px;
            margin-bottom: 20px;
            padding: 3px;
            background-color: #45c4b7;
            color: #ffffff;
            border-radius: 0px;
            font-size: 18px;
            text-align: center;
            text-indent: 0px;
            position: relative;
            overflow: hidden;
            border-top: 1px solid black;
            border-bottom: 1px solid black;
        }

        /* 必須マークのスタイル */
        .required {
            color: #ffffff;
            font-weight: lighter;
            font-size: 0.6em;
            margin-left: 5px;
            vertical-align: 0.8em;
            background-color: rgb(255, 15, 15);
            padding: 0 5px;
            border-radius: 3px;
            margin-right: 5px;
        }

        input[type="text"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #555555;
            border-radius: 3px;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s;
            position: relative;
            top: -5px;
        }

        .visit-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .visit-buttons button {
            flex: 1;
            padding: 10px;
            border: 1px solid #2e2e2e;
            border-radius: 4px;
            background-color: #f7f7f7;
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
            white-space: nowrap;
        }

        .visit-buttons button.active {
            background-color: #ffffff;
            color: #141414;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: -6px 0;
        }

        hr {
            margin: -5px 0;
        }

        .edit-button {
            background-color: #ffffff;
            color: #1a1a1a;
            border: 1px solid black;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            transition: background-color 0.3s;
            white-space: nowrap;
            width: auto;
            text-align: center;
        }

        .edit-button:hover {
            background-color: #45c4b7;
            color: #ffffff;
        }

        /* フォーカス時のスタイル */
        input:focus,
        textarea:focus {
            border-color: #45c4b7;
            outline: none;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.2);
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #3e3f41;
            color: #000000;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background-color: #e9e9e9;
            transform: scale(1.05);
        }

        .submit-button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background-color: #45c4b7;
            margin-top: 12px;
            color: #fff;
        }

        .submit-button:hover {
            background-color: #45c4b7;
            color: #fff;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 22px;
            }

            input,
            button {
                font-size: 14px;
            }
        }

        button.active {
            outline: 1px solid #2b2b2b;
            outline-offset: 2px;
            box-shadow: 0 0 0 3px #45c4b7
        }

        .datetime-input {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            border: 1px solid #000000;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #fff;
            color: #333;
            appearance: none;
            touch-action: manipulation;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .datetime-input:focus {
            border-color: #007BFF;
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.2);
            outline: none;
        }

        .small-text {
            font-size: 22px;
        }

        /* === カレンダー === */
        .calendar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
            width: 100%;
        }

        .calendar {
            flex: 1;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
        }

        .calendar table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .calendar th,
        .calendar td {
            font-size: 12.5px;
            text-align: center;
            padding: 5px;
            cursor: pointer;
            vertical-align: top;
            width: auto;
            box-sizing: border-box;
            border: 1px solid #1a1a1a;
        }

        .calendar th:first-child,
        .calendar td:first-child {
            width: 17%;
            font-size: 12.5px;
        }

        .calendar th {
            background-color: #f7f7f7;
        }

        .calendar td:hover {
            background-color: #ddd;
        }

        .calendar td.selected {
            background-color: #45c4b7;
            color: #fff;
        }

        .available {
            color: red;
        }

        .unavailable {
            background-color: #d3d3d3;
        }

        .month-button-container,
        .week-button-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
        }

        .month-button,
        .week-button {
            padding: 10px 20px;
            background-color: #ffffff;
            color: #222222;
            border: 1px solid black;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            transform-origin: center center;
        }

        .month-button:hover,
        .week-button:hover {
            background-color: #ffffff;
            transform: scale(1.15);
        }

        .month-button:active,
        .week-button:active {
            transform: scale(0.95);
        }

        .current-month {
            text-align: center;
            display: block;
            position: absolute;
            left: 50%;
            transform: translate(-50%, -10px);
            background-color: #45c4b7;
            color: #fff;
            padding: 3px 12px;
            border-radius: 8px;
            font-size: 1.4rem;
            font-weight: 300;
            box-shadow: 0 2px 6px rgba(47, 103, 167, 0.2);
            z-index: 1;
        }

        .calendar-note {
            font-size: 13px;
            color: #000000;
            line-height: 1.5;
            text-align: center;
            margin: 0 0 10px;
        }

        .loading-spinner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 2000;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top-color: #45c4b7;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-left: 12px;
        }

        .loading-text {
            margin-top: 20px;
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 1px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <!-- 右側の追従ナビ -->
    <div class="side-nav" id="sideNav">
        <a href="#section-message">
            <span>⇩</span>
            <i class="fas fa-comment"></i>
        </a>
    </div>

    <div class="container">
        <h1>
            <span class="small-text">Nagi Method Academy</span><br>
            個別相談予約フォーム
        </h1>

        <!-- お名前（必須） -->
        <div class="label">お名前<span class="required">必須</span></div>
        <input type="text" id="name" placeholder="お名前を入力してください" oninput="saveInput('name')">

        <!-- 電話番号（必須） -->
        <div class="label">電話番号<span class="required">必須</span></div>
        <input type="tel" id="phone" placeholder="電話番号を入力してください" oninput="saveInput('phone')">

        <!-- 開業の有無（必須） -->
        <div class="label">開業の有無<span class="required">必須</span></div>
        <div class="visit-buttons">
            <button type="button" id="kaigyouYes" onclick="selectKaigyou(this)">開業している</button>
            <button type="button" id="kaigyouNo" onclick="selectKaigyou(this)">これから開業する</button>
        </div>

        <!-- ZOOM希望の有無（必須） -->
        <div class="label">ZOOM希望の有無<span class="required">必須</span></div>
        <div class="visit-buttons">
            <button type="button" id="zoomYes" onclick="selectZoom(this)">zoom、電話で受けたい</button>
            <button type="button" id="zoomNo" onclick="selectZoom(this)">サロンで体験付きで受けたい</button>
        </div>

        <!-- 生年月日（必須） -->
        <div class="label">生年月日<span class="required">必須</span></div>
        <input type="date" id="birthday" onchange="saveInput('birthday'); updateDisplayInfo()" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #555555; border-radius:3px; box-sizing:border-box; font-size:16px; position:relative; top:-5px;">

        <!-- 希望日時（必須） -->
        <div class="labelkibounitizi" id="kibou">希望日時<span class="required">必須</span></div>
        <div class="calendar-note">※◯の枠をタップして日時をお選びください</div>
        <div class="calendar-container">
            <div class="current-month-container">
                <span class="current-month" id="currentMonth">月</span>
            </div>

            <div class="month-button-container">
                <button class="month-button" onclick="previousmonth()">前月</button>
                <button class="month-button" onclick="nextmonth()">翌月</button>
            </div>

            <div class="week-button-container">
                <button class="week-button" onclick="previousWeek()">前週</button>
                <button class="week-button" onclick="nextWeek()">翌週</button>
            </div>

            <div id="calendar1" class="calendar">
                <table>
                    <thead>
                        <tr id="calendar-header">
                            <th>時間</th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- カレンダーの内容がここに追加される -->
                    </tbody>
                </table>
            </div>

            <div class="loading-spinner" id="loadingSpinner">
                <div class="spinner"></div>
                <div class="loading-text">読み込み中...</div>
            </div>
        </div>

        <!-- 備考（任意） -->
        <div class="labelmessezi">備考</div>
        <textarea id="message" rows="4" placeholder="備考があればご記入ください"></textarea>

        <!-- ご予約内容 -->
        <div class="labeltyuuou">ご予約内容</div>
        <div id="displayInfo"></div>

        <button class="submit-button" onclick="submitForm()" id="section-message">予約を送信する</button>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <script>
        // グローバル変数
        let kaigyouStatus = '';
        let zoomStatus = '';
        let currentDate = new Date();
        let selectedFullDate = '';
        let selectedISODate = '';
        let availabilityCache = {};

        // GoogleカレンダーのGASエンドポイント
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbw75TzxI6kdqJx3LOE6H_Z7z8f38IGOFdMr0yIiB4J2B8omMsDe9EOP-muAf1-Prfnn/exec';

        // 1枠あたりの所要時間（分）※ZOOM・電話・サロン体験ともに60分
        const SLOT_MINUTES = 60;

        // LIFF初期化
        document.addEventListener('DOMContentLoaded', function () {
            liff.init({
                liffId: '2009736561-HYBiPxcM'
            }).then(() => {
                console.log('LIFF初期化成功');
            }).catch((err) => {
                console.log('LIFF初期化失敗', err);
            });

            fetchAvailability(currentDate);
        });

        // 入力内容をローカルストレージに保存
        function saveInput(id) {
            const value = document.getElementById(id).value;
            localStorage.setItem(id, value);
        }

        // ページが読み込まれたときに前回の入力内容を復元
        document.addEventListener('DOMContentLoaded', function () {
            const savedName = localStorage.getItem('name');
            const savedPhone = localStorage.getItem('phone');

            if (savedName) document.getElementById('name').value = savedName;
            if (savedPhone) document.getElementById('phone').value = savedPhone;
        });

        // スムーズスクロール
        document.querySelectorAll('.side-nav a').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const targetId = this.getAttribute('href').substring(1);
                const targetElement = document.getElementById(targetId);
                if (targetElement) {
                    window.scrollTo({
                        top: targetElement.offsetTop - 20,
                        behavior: 'smooth'
                    });
                }
            });
        });

        // 開業の有無を選択
        function selectKaigyou(element) {
            document.getElementById('kaigyouYes').classList.remove('active');
            document.getElementById('kaigyouNo').classList.remove('active');
            element.classList.add('active');
            kaigyouStatus = element.innerText;
            updateDisplayInfo();
        }

        // ZOOM希望の有無を選択
        function selectZoom(element) {
            document.getElementById('zoomYes').classList.remove('active');
            document.getElementById('zoomNo').classList.remove('active');
            element.classList.add('active');
            zoomStatus = element.innerText;
            updateDisplayInfo();
        }

        // ご予約内容の表示更新
        function updateDisplayInfo() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const kaigyouText = kaigyouStatus ? `・${kaigyouStatus}` : '・開業の有無が未選択です';
            const zoomText = zoomStatus ? `・${zoomStatus}` : '・ZOOM希望の有無が未選択です';
            const birthdayVal = document.getElementById('birthday').value;
            const birthdayText = birthdayVal ? `・${birthdayVal.replace(/-/g, '/')}` : '・生年月日が未入力です';

            // 希望日時
            const selectedDateText = selectedFullDate
                ? `・${selectedFullDate}`
                : '・希望日時が未選択です';

            // 予約内容を表示
            document.getElementById('displayInfo').innerHTML = `
        <div class="info-row">
            <p><span style="color:#45c4b7;"><strong>【お名前】</strong></span><br>・${name}</p>
            <button class="edit-button" onclick="scrollToElement('name')">修正</button>
        </div>
        <hr>
        <div class="info-row">
            <p><span style="color:#45c4b7;"><strong>【電話番号】</strong></span><br>・${phone}</p>
            <button class="edit-button" onclick="scrollToElement('phone')">修正</button>
        </div>
        <hr>
        <div class="info-row">
            <p><span style="color:#45c4b7;"><strong>【開業の有無】</strong></span><br>${kaigyouText}</p>
            <button class="edit-button" onclick="scrollToElement('kaigyouYes')">修正</button>
        </div>
        <hr>
        <div class="info-row">
            <p><span style="color:#45c4b7;"><strong>【ZOOM希望の有無】</strong></span><br>${zoomText}</p>
            <button class="edit-button" onclick="scrollToElement('zoomYes')">修正</button>
        </div>
        <hr>
        <div class="info-row">
            <p><span style="color:#45c4b7;"><strong>【生年月日】</strong></span><br>${birthdayText}</p>
            <button class="edit-button" onclick="scrollToElement('birthday')">修正</button>
        </div>
        <hr>
        <div class="info-row">
            <p><span style="color:#45c4b7;"><strong>【希望日時】</strong></span><br>${selectedDateText}</p>
            <button class="edit-button" onclick="scrollToElement('kibou')">修正</button>
        </div>
        <hr>
    `;
        }

        // スクロール関数
        function scrollToElement(id) {
            const element = document.getElementById(id);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // 各入力フィールドでupdateDisplayInfoを呼び出す
        document.getElementById('name').addEventListener('input', updateDisplayInfo);
        document.getElementById('phone').addEventListener('input', updateDisplayInfo);

        // === カレンダー ===
        const JP_WD = ['日', '月', '火', '水', '木', '金', '土'];
        const pad = n => String(n).padStart(2, '0');

        // 営業時間（全曜日共通・定休日なし）：10:00〜21:00 の30分刻み
        const OPEN_MINUTES = 10 * 60;   // 10:00
        const CLOSE_MINUTES = 21 * 60;  // 21:00（最終受付）

        // 予約を受け付ける期間（当日から2週間先まで）
        const BOOKABLE_DAYS = 14;

        // カレンダーに並べる時間帯
        const TIMES = (() => {
            const list = [];
            for (let t = OPEN_MINUTES; t <= CLOSE_MINUTES; t += 30) {
                list.push(`${pad(Math.floor(t / 60))}:${pad(t % 60)}`);
            }
            return list;
        })();

        // 営業時間内かどうか（最終受付時間まで）
        function isWithinBusinessHours(h, m) {
            const minutes = h * 60 + m;
            return minutes >= OPEN_MINUTES && minutes <= CLOSE_MINUTES;
        }

        // 予約可能期間内かどうか（当日から2週間先以降は不可）
        function isWithinBookableRange(day) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const limit = new Date(today);
            limit.setDate(limit.getDate() + BOOKABLE_DAYS);

            const target = new Date(day);
            target.setHours(0, 0, 0, 0);

            return target >= today && target < limit;
        }

        // Googleカレンダー（GAS）から空き状況を取得
        async function fetchAvailability(date) {
            const startTime = new Date(date);
            const endTime = new Date(date);
            endTime.setDate(endTime.getDate() + 7);

            const cacheKey = startTime.toISOString() + endTime.toISOString();

            // キャッシュを確認
            if (availabilityCache[cacheKey]) {
                console.log('Using cached data');
                updateCalendar(availabilityCache[cacheKey].availability, availabilityCache[cacheKey].businessDays);
                return;
            }

            const url = GAS_URL + `?startTime=${startTime.toISOString()}&endTime=${endTime.toISOString()}`;

            try {
                showLoadingSpinner();
                const response = await fetch(url);
                const data = await response.json();
                console.log(data);

                // 営業日の情報を抽出
                const businessDays = data.filter(event => event.summary === "営業日").map(event => {
                    return {
                        start: new Date(event.startTime),
                        end: new Date(event.endTime)
                    };
                });

                // データをキャッシュに保存
                availabilityCache[cacheKey] = { availability: data, businessDays: businessDays };

                updateCalendar(data, businessDays);
            } catch (error) {
                console.error('Error fetching availability:', error);
                // 取得に失敗しても営業ルールだけでカレンダーを描画する
                updateCalendar([], []);
            } finally {
                hideLoadingSpinner();
            }
        }

        function updateCalendar(availability, businessDays) {
            const calendar = document.getElementById('calendar1');
            const table = calendar.querySelector('table tbody');

            if (table.rows.length === 0) {
                for (const time of TIMES) {
                    const row = document.createElement('tr');
                    const timeCell = document.createElement('td');
                    timeCell.textContent = time;
                    row.appendChild(timeCell);

                    for (let i = 0; i < 7; i++) {
                        const cell = document.createElement('td');
                        cell.addEventListener('click', () => selectDate(cell));
                        row.appendChild(cell);
                    }

                    table.appendChild(row);
                }
            }

            // テーブルのヘッダーを更新
            updateCalendarHeader(currentDate);

            // 各セルを空白にリセットし、クラスもリセット
            for (let row of table.rows) {
                for (let i = 1; i < row.cells.length; i++) {
                    row.cells[i].textContent = '';
                    row.cells[i].removeAttribute('data-date');
                    row.cells[i].classList.remove('available', 'unavailable', 'selected');
                }
            }

            const now = new Date();

            for (let i = 0; i < 7; i++) {
                const day = new Date(currentDate);
                day.setDate(day.getDate() + i);

                // 当日から2週間先以降（および過去の日）はすべて✕
                if (!isWithinBookableRange(day)) {
                    for (let j = 0; j < TIMES.length; j++) {
                        const cell = table.rows[j].cells[i + 1];
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                    }
                    continue;
                }

                // 営業日のイベント時間帯を記録
                let businessEventTimes = [];
                availability.forEach(slot => {
                    const eventStart = new Date(slot.startTime);
                    const eventEnd = new Date(slot.endTime);
                    if (eventStart.toDateString() === day.toDateString() && slot.title === "営業日") {
                        businessEventTimes.push({ start: eventStart, end: eventEnd });
                    }
                });

                for (let j = 0; j < TIMES.length; j++) {
                    const cell = table.rows[j].cells[i + 1];

                    const [hh, mm] = TIMES[j].split(':').map(n => parseInt(n, 10));

                    const slotStart = new Date(day);
                    slotStart.setHours(hh, mm, 0, 0);

                    const slotEnd = new Date(slotStart);
                    slotEnd.setMinutes(slotStart.getMinutes() + SLOT_MINUTES);

                    // 営業時間外は✕
                    if (!isWithinBusinessHours(hh, mm)) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                        continue;
                    }

                    // 過去の時間は✕
                    if (slotStart < now) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                        continue;
                    }

                    // 当日の営業時間内かどうか（Googleカレンダーイベント）
                    const isBusinessEventTime = businessEventTimes.some(event => {
                        return slotStart >= event.start && slotEnd <= event.end;
                    });

                    // 通常の営業日（手動設定されたbusinessDays）
                    const isBusinessDay = businessDays.some(businessDay => {
                        const businessDayStart = new Date(businessDay.start);
                        const businessDayEnd = new Date(businessDay.end);
                        return slotStart >= businessDayStart && slotEnd <= businessDayEnd;
                    });

                    // 営業日以外の重複イベント（＝既存予約）を取得
                    const relevantEvents = availability.filter(slot => {
                        const eventStart = new Date(slot.startTime);
                        const eventEnd = new Date(slot.endTime);
                        return slot.title !== "営業日" && eventStart < slotEnd && eventEnd > slotStart;
                    });

                    // 同時刻に既存予約があると✕
                    let overLimit = false;
                    for (let checkTime = new Date(slotStart.getTime()); checkTime < slotEnd; checkTime.setMinutes(checkTime.getMinutes() + 1)) {
                        let overlapping = 1;
                        relevantEvents.forEach(slot => {
                            if (new Date(slot.startTime) <= checkTime && new Date(slot.endTime) > checkTime) {
                                overlapping++;
                            }
                        });
                        if (overlapping >= 2) { overLimit = true; break; }
                    }

                    // 最終的な可否判定
                    if (isBusinessEventTime && !overLimit) {
                        cell.textContent = '◯';
                        cell.classList.add('available');
                    } else if (isBusinessEventTime && overLimit) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                    } else if (isBusinessDay && !overLimit) {
                        cell.textContent = '◯';
                        cell.classList.add('available');
                    } else if (!isBusinessEventTime && businessEventTimes.length > 0) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                    } else if (!overLimit) {
                        cell.textContent = '◯';
                        cell.classList.add('available');
                    } else {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                    }

                    // セルにこの時間帯のデータ属性を追加（ISO形式の日時）
                    cell.setAttribute('data-date', slotStart.toISOString());

                    // 既に選択済みの枠なら選択状態を復元
                    if (selectedISODate && cell.getAttribute('data-date') === selectedISODate) {
                        cell.classList.add('selected');
                    }
                }
            }
        }

        // 日時セルの選択
        function selectDate(cell) {
            // 選択不可のセルは無視
            if (cell.classList.contains('unavailable') || !cell.getAttribute('data-date')) {
                return;
            }

            // 既に選択されているセルの選択を解除
            document.querySelectorAll('.calendar td').forEach(td => td.classList.remove('selected'));

            cell.classList.add('selected');

            selectedISODate = cell.getAttribute('data-date');
            const date = new Date(selectedISODate);
            selectedFullDate = `${date.getFullYear()}年${pad(date.getMonth() + 1)}月${pad(date.getDate())}日 ${pad(date.getHours())}:${pad(date.getMinutes())}`;

            updateDisplayInfo();
        }

        function nextmonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            currentDate.setDate(1);
            fetchAvailability(currentDate);
        }

        function previousmonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            currentDate.setDate(1);
            fetchAvailability(currentDate);
        }

        function nextWeek() {
            currentDate.setDate(currentDate.getDate() + 7);
            fetchAvailability(currentDate);
        }

        function previousWeek() {
            currentDate.setDate(currentDate.getDate() - 7);
            fetchAvailability(currentDate);
        }

            document.getElementById('loadingSpinner').style.display = 'block';

            document.getElementById('loadingSpinner').style.display = 'none';

            }]).then(() => {
